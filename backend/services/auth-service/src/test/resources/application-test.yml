spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  redis:
    host: localhost
    port: 6379

jwt:
  secret: test-secret-key-for-testing-only-minimum-256-bits
  expiration-ms: 3600000
  remember-me-expiration-ms: 86400000
